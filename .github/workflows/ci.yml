name: CI

on:
  push:
    branches: [main, mahendra-dev, hardik-dev, kanishk-dev, praveen-dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soar_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 fallback install for python-multipart to avoid pip dependency-resolution conflicts

      - name: Wait for services
        run: |
          echo "Waiting for Postgres and Redis to be ready..."
          # Wait up to ~60s for Postgres (use postgres user explicitly)
          for i in {1..12}; do
            if pg_isready -q -h localhost -p 5432 -U postgres; then
              echo "Postgres ready"
              break
            fi
            echo "Postgres not ready yet, sleeping..."
            sleep 5
          done
          # Wait up to ~30s for Redis
          for i in {1..6}; do
            if redis-cli -h localhost ping | grep -q PONG; then
              echo "Redis ready"
              break
            fi
            echo "Redis not ready yet, sleeping..."
            sleep 5
          done

    - name: Run tests with coverage

          pip install pytest
      - name: Run tests
        working-directory: backend

        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/soar_db_test
          REDIS_URL: redis://localhost:6379/0
        run: |


          cd backend
          pytest -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

          python -m pytest -v

          cd backend
          pytest -v

